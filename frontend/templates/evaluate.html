{% extends "base.html" %}
{% block title %}上传评估{% endblock %}
{% block content %}
<h1>📊 上传评估</h1>

<div class="section">
    <h3>1. 选择细胞</h3>
    <label>数据集：</label>
    <select id="dataset-select"><option value="">-- 请选择 --</option></select>
    <label>重复类型：</label>
    <select id="rep-select" disabled><option value="">-- 请先选数据集 --</option></select>
    <label>细胞ID：</label>
    <select id="cell-select" disabled><option value="">-- 请先选重复类型 --</option></select>
</div>

<div class="section">
    <h3>2. 参数设置</h3>
    <label>染色体：</label><input type="text" id="chrom-input" value="chr19">
    <label>起始(bp)：</label><input type="number" id="start-input" value="0">
    <label>结束(-1=全长)：</label><input type="number" id="end-input" value="-1">
    <label>分辨率(bp)：</label><input type="number" id="resolution-input" value="20000">
</div>

<div class="section">
    <h3>3. 上传预测坐标文件</h3>
    <input type="file" id="pred-file" accept=".txt,.npy">
</div>

<button id="evaluate-btn" disabled>开始评估</button>

<div id="results" style="display:none; margin-top:20px;"></div>

<script src="/static/js/evaluate.js"></script>
{% endblock %}
